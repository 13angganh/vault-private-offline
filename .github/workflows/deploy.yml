name: Deploy Vault PWA

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject cache version (timestamp otomatis)
        run: |
          VERSION=$(date +%Y%m%d%H%M%S)
          sed -i "s/__CACHE_VERSION__/${VERSION}/g" sw.js
          echo "Cache version: vault-v4-${VERSION}"

      - name: Commit & push sw.js yang sudah diupdate
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sw.js
          git diff --staged --quiet || git commit -m "chore: auto cache bust [${GITHUB_SHA::7}]"
          git push
